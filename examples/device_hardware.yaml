# Example QubiC device configuration (Local hardware mode)
#
# This configuration executes directly on QubiC hardware via PLInterface.
# Requires physical QubiC hardware and FPGA bitstream.

framework: qubic
target: superconducting_cnot
num_qubits: 3

# Calibration and configuration files
calibration_path: ./qubitcfg.json
channel_config_path: ./channel_config.json
classifier_path: ./gmm_classifier.json

# Local hardware mode configuration
runner_mode: local
xsa_commit: abc123def456789  # Replace with actual FPGA bitstream commit hash

# Optional: specify QubiC vendor checkout location
# qubic_root: /path/to/qubic
