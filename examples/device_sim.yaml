# Example QubiC device configuration (Simulation mode)
#
# This configuration uses QubiC's built-in simulator for testing without hardware.

framework: qubic
target: superconducting_cnot
num_qubits: 3

# Calibration and configuration files
calibration_path: ./qubitcfg.json
channel_config_path: ./channel_config.json
# Pickle is required for JobManager string paths (see scripts/build-example-gmm-pickle.py).
classifier_path: ./gmm_classifier_sim.pkl

# Simulation mode configuration
runner_mode: local
use_sim: true

# Optional: specify QubiC vendor checkout location
# qubic_root: /path/to/qubic
