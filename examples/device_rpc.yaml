# Example QubiC device configuration (RPC mode)
#
# This configuration connects to a QubiC RPC server for circuit execution.
# Use this mode when QubiC is running as a remote service.

framework: qubic
target: superconducting_cnot
num_qubits: 3

# Calibration and configuration files
calibration_path: ./qubitcfg.json
channel_config_path: ./channel_config.json
classifier_path: ./gmm_classifier.json

# RPC mode configuration
runner_mode: rpc
rpc_host: localhost
rpc_port: 9734

# Optional: specify QubiC vendor checkout location
# qubic_root: /path/to/qubic
